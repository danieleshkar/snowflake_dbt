version: 2

models:
  - name: ltp_daily_itemized_new_billing_tbl
    config:
      grants:
        +select: ['CLAUDE_PILOT_ROLE']
    description: |
      CRITICAL: This is a daily SNAPSHOT of monthly recurring billing, not
      daily revenue values. Each row's `amount` represents the monthly
      billing for that LTP+item line based on the seat count snapshotted on
      `billing_date` — NOT the revenue earned that single day. Multiple rows
      for the same LTP+item across different `billing_date` values represent
      re-snapshots of the same monthly billing as the seat count changed,
      not separate daily charges.

      KEY DATE SEMANTICS:
      - During a month: each daily row is a running projection of THAT
        month's billing based on current seats.
      - On the 1st of the next month: the row represents the just-closed
        month's FINAL SETTLED total. For example, the row dated 2026-05-01
        is April 2026's settled total; the row dated 2026-04-01 is March
        2026's settled total.

      HOW TO QUERY CORRECTLY:

      Current MRR (live / month-to-date projection):
          SELECT SUM(amount)
          FROM ltp_daily_itemized_new_billing_tbl
          WHERE billing_date = (SELECT MAX(billing_date)
                                 FROM ltp_daily_itemized_new_billing_tbl);

      Historical settled monthly revenue — query the 1st of each month
      (each row dated 1st represents the previous month's final total):
          SELECT billing_date AS settled_month_start,
                 SUM(amount) AS prev_month_revenue
          FROM ltp_daily_itemized_new_billing_tbl
          WHERE billing_date IN ('2026-05-01','2026-04-01','2026-03-01','2026-02-01')
          GROUP BY 1;
          -- Result: 2026-05-01 row = April total, 2026-04-01 row = March
          -- total, etc.

      Net change / churn / new business — diff two snapshots.

      NEVER do this — double-counts ~30x:
          -- WRONG: sums recurring revenue once per day across many days
          SELECT SUM(amount)
          FROM ltp_daily_itemized_new_billing_tbl
          WHERE billing_date BETWEEN '2026-04-01' AND '2026-04-30';

      GRANULARITY: One row per billing_date + ltp + item + sku +
      partner_pricing + price_type. The ltp column always represents the root
      / first layer tenant (depth = 0). For per-tenant (sub-LTP) granularity,
      use sltp_daily_itemized_new_billing_tbl. Join to global_tenant_history
      on ltp = tenant_global_id for LTP details (name, type, currency).

      ROW TYPES (unioned together):
      1. Standard itemized billing rows per product and pricing type.
      2. NFR rows (item = 'NFR', sku = 'IS-LTP-NFR') — the LTP's own partner
         seats billed at a special rate. Applies only to MSP-type LTPs
         registered 90+ days ago. First 100 NFR seats are complimentary.

    columns:
      - name: billing_date
        description: |
          The date this snapshot was calculated. Each daily run inserts new
          rows tagged with current_date. Use MAX(billing_date) for current
          MRR. Use the 1st of a month to get the previous month's settled
          total (e.g., 2026-05-01 row = April 2026 total). The full range
          shows MRR over time — but NEVER sum amounts across billing_date
          values, that double-counts recurring revenue.

      - name: ltp
        description: >
          The tenant_global_id of the Low Touch Partner (LTP) being billed.
          Always represents the root / first layer tenant (depth = 0). Join
          to global_tenant_history on the root column to get LTP details.

      - name: item
        description: |
          The product line item being billed. Can be a base plan, an add-on,
          or NFR.

          Base plans: 'Email Protect', 'Complete Protect', 'Core',
          'IRONSCALES Protect', 'Phishing Simulation and Training', 'Starter',
          'SAT Suite'.

          Add-ons: 'DMARC', 'Account Takeover', 'Incident Management',
          'Multi Tenant', 'S&T Bundle', 'S&T Plus Bundle',
          'Security Awareness Training', 'Habitu8', 'NINJIO',
          'Cybermaniacs Videos'.

          Special: 'NFR' — the LTP's own partner seats billed at a special
          rate. Only applies to MSP-type LTPs registered 90+ days ago. The
          first 100 NFR seats are complimentary and not billed.

      - name: sku
        description: >
          Product code for the billed item. Encodes both the product and the
          pricing type — SKUs ending with 'nfr' represent partner-priced
          (NFR) seats for that item. For NFR rows the sku is always
          'IS-LTP-NFR'. Use sku for granular product + pricing tier reporting,
          item for product-only reporting.

      - name: partner_pricing
        description: >
          Boolean. True means the tenant has partner status — they are a
          reseller or MSP with a partner commercial relationship with
          IRONSCALES. False means the tenant is an end customer without
          partner status. Null for NFR rows.

      - name: price_type
        description: >
          The pricing rate type applied to this row. Values:
          'standard' — no special rate, billed at the standard price.
          'promo' — a promotional rate applied for a specific time period.
          'Exceptional' — a custom exceptional rate for a specific tenant or
          MSP. Null for NFR rows.

      - name: quantity
        description: |
          Number of billable units (seats/mailboxes) for this item on
          billing_date, aggregated across all tenants under the LTP. SNAPSHOT
          of the current seat count on that date — NOT a daily delta or
          increment. For NFR rows this is the total NFR seat count before
          the 100-seat free tier is applied.

      - name: amount
        description: |
          MONTHLY recurring billing amount in the LTP's local currency for
          this item, calculated from `quantity` and the applicable rate as
          of `billing_date`. NOT a daily-prorated value. NEVER sum amount
          across multiple billing_date values, that double-counts recurring
          revenue (~30x inflation if summing across a month). For current
          MRR, filter to MAX(billing_date). For historical monthly settled
          revenue, query the 1st of each month (e.g., 2026-05-01 = April
          settled total). For NFR rows, this is the invoiced amount after
          applying the conversion rate and deducting the 100-seat free tier.


  - name: sltp_daily_itemized_new_billing_tbl
    config:
      grants:
        +select: ['CLAUDE_PILOT_ROLE']
    description: |
      CRITICAL: Same snapshot semantics as ltp_daily_itemized_new_billing_tbl
      — each row's `amount` is a daily snapshot of monthly recurring billing,
      NOT daily revenue. NEVER sum amount across multiple billing_date values;
      that double-counts recurring revenue (~30x inflation across a month).
      For current MRR filter to MAX(billing_date). For historical monthly
      settled totals, query the 1st of the next month (e.g., the 2026-05-01
      row represents April 2026's settled total).

      Lower-granularity counterpart of ltp_daily_itemized_new_billing_tbl.
      Where the LTP table aggregates to the root partner (depth = 0), this
      table explodes the same billing down to the actual leaf tenant in the
      tenant hierarchy. Use this for per-customer revenue analysis; use the
      LTP table for per-partner totals. On any single billing_date, totals
      across the two tables match — same revenue, different granularity.

      The tenant path is encoded across five columns — first_layer_id
      through fifth_layer_id — representing depth-ordered positions from
      root to leaf. first_layer_id is always populated and equals the ltp
      column in ltp_daily_itemized_new_billing_tbl. Layers beyond the
      actual depth are empty strings (''), not NULL. The last non-empty
      layer is the leaf tenant being billed; join that value to
      global_tenant_history.tenant_global_id for tenant details.

      Hierarchy patterns observed:
      1 layer  — LTP-only / self-billed (~337 LTPs)
      2 layers — Direct MSP -> Customer (~302 LTPs, most common)
      3 layers — Disti -> MSP -> Customer (~35 LTPs, typical disti)
      4 layers — Disti -> MSSP -> MSP -> Customer (~4 LTPs, rare)
      5 layers — Deeper configurations (~2 LTPs, very rare)

      ROW TYPES (same as the LTP table):
      1. Standard itemized billing rows per product and pricing type.
      2. NFR rows (item = 'NFR', sku = 'IS-LTP-NFR') — same NFR rules as LTP
         table: MSP-type LTPs registered 90+ days ago, first 100 seats free.
      3. Min-commit top-up rows (sku = 'IS-LTP-MIN') when an LTP's daily
         total falls below their monthly_commitment_amount.

    columns:
      - name: billing_date
        description: |
          Date this snapshot was calculated. Each daily run inserts new rows
          tagged with current_date. Use MAX(billing_date) for current MRR.
          Use the 1st of a month for the previous month's settled total
          (e.g., 2026-05-01 row = April 2026 total). NEVER sum amounts
          across billing_date values, that double-counts recurring revenue.

      - name: first_layer_id
        description: >
          The tenant_global_id of the root / first layer tenant in the
          hierarchy (depth = 0). Always populated. Same value as the ltp
          column in ltp_daily_itemized_new_billing_tbl. Join to
          global_tenant_history.tenant_global_id to get LTP details.

      - name: second_layer_id
        description: >
          The tenant_global_id of the second-layer tenant (depth = 1).
          Empty string ('') if the path doesn't go this deep (i.e., the LTP
          bills itself at the root only). When populated, this tenant is a
          direct child of first_layer_id.

      - name: third_layer_id
        description: >
          The tenant_global_id of the third-layer tenant (depth = 2). Empty
          string ('') if not populated. Common in distributor-led
          arrangements: Disti -> MSP -> Customer, where third_layer_id is
          the customer.

      - name: fourth_layer_id
        description: >
          The tenant_global_id of the fourth-layer tenant (depth = 3).
          Empty string ('') if not populated. Rare — typical pattern is
          Disti -> MSSP -> MSP -> Customer.

      - name: fifth_layer_id
        description: >
          The tenant_global_id of the fifth-layer tenant (depth = 4). Empty
          string ('') if not populated. Very rare — deepest configuration
          observed.

      - name: item
        description: |
          The product line item being billed. Can be a base plan, an add-on,
          or NFR.

          Base plans: 'Email Protect', 'Complete Protect', 'Core',
          'IRONSCALES Protect', 'Phishing Simulation and Training', 'Starter',
          'SAT Suite'.

          Add-ons: 'DMARC', 'Account Takeover', 'Incident Management',
          'Multi Tenant', 'S&T Bundle', 'S&T Plus Bundle',
          'Security Awareness Training', 'Habitu8', 'NINJIO',
          'Cybermaniacs Videos'.

          Special: 'NFR' — the LTP's own partner seats billed at a special
          rate. Only applies to MSP-type LTPs registered 90+ days ago. The
          first 100 NFR seats are complimentary and not billed.

      - name: sku
        description: >
          Product code for the billed item. Encodes both the product and
          the pricing type — SKUs ending with 'nfr' represent partner-priced
          (NFR) seats for that item. NFR rows always have sku = 'IS-LTP-NFR'.
          Min-commit top-up rows have sku = 'IS-LTP-MIN'. Use sku for
          granular product + pricing tier reporting, item for product-only
          reporting.

      - name: partner_pricing
        description: >
          Boolean. True means the tenant has partner status — they are a
          reseller or MSP with a partner commercial relationship with
          IRONSCALES. False means the tenant is an end customer without
          partner status. Null for NFR rows.

      - name: price_type
        description: >
          The pricing rate type applied to this row. Values:
          'standard' — no special rate, billed at the standard price.
          'promo' — a promotional rate applied for a specific time period.
          'Exceptional' — a custom exceptional rate for a specific tenant or
          MSP. Null for NFR rows.

      - name: quantity
        description: |
          Number of billable units (seats/mailboxes) for this item on
          billing_date, for the specific tenant identified by the layer
          columns. SNAPSHOT of the current seat count on that date — NOT a
          daily delta. For NFR rows this is the total NFR seat count before
          the 100-seat free tier is applied.

      - name: amount
        description: |
          MONTHLY recurring billing amount in the LTP's local currency for
          this item, for the specific tenant identified by the layer columns,
          calculated from `quantity` and the applicable rate as of
          `billing_date`. NOT a daily-prorated value. NEVER sum amount
          across multiple billing_date values, that double-counts recurring
          revenue. For current MRR, filter to MAX(billing_date). For
          historical monthly settled revenue, query the 1st of each month
          (e.g., 2026-05-01 = April settled total). Sum across all rows in
          this table for a given LTP root on a SINGLE billing_date equals
          the LTP-aggregated amount in ltp_daily_itemized_new_billing_tbl
          for that same date. For NFR rows, this is the invoiced amount
          after applying the conversion rate and deducting the 100-seat
          free tier.