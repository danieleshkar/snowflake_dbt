version: 2

models:
  - name: ltp_daily_itemized_new_billing_tbl
    config:
      grants:
        +select: ['CLAUDE_PILOT_ROLE']
    description: >
      Daily itemized billing amounts per Low Touch Partner (LTP) using the updated
      billing calculation. One row per billing_date + ltp + item + sku +
      partner_pricing + price_type combination.

      This is the most up-to-date billing table and supersedes
      ltp_daily_itemized_billing_tbl. Use this table for daily revenue and
      license quantity reporting by partner.

      The ltp column always represents the root / first layer tenant (depth = 0).
      Join to global_tenant_history on the root column to get LTP details.

      Contains two types of rows unioned together:
      1. Standard itemized billing rows per product and pricing type.
      2. NFR rows (item = 'NFR', sku = 'IS-LTP-NFR') representing the LTP's own
         partner seats billed at a special rate. NFR billing applies only to MSP-type
         LTPs registered 90+ days ago, with the first 100 seats complimentary.

    columns:
      - name: billing_date
        description: >
          The date this billing record applies to. Always current_date as this
          table calculates the current day's billing only.

      - name: ltp
        description: >
          The tenant_global_id of the Low Touch Partner (LTP) being billed. Always
          represents the root / first layer tenant (depth = 0). Join to
          global_tenant_history on the root column to get LTP details.

      - name: item
        description: >
          The product line item being billed. Can be a base plan, an add-on, or NFR.

          Base plans: 'Email Protect', 'Complete Protect', 'Core', 'IRONSCALES Protect',
          'Phishing Simulation and Training', 'Starter', 'SAT Suite'.

          Add-ons: 'DMARC', 'Account Takeover', 'Incident Management', 'Multi Tenant',
          'S&T Bundle', 'S&T Plus Bundle', 'Security Awareness Training',
          'Habitu8', 'NINJIO', 'Cybermaniacs Videos'.

          Special: 'NFR' — the LTP's own partner seats billed at a special rate.
          Only applies to MSP-type LTPs registered 90+ days ago. The first 100
          NFR seats are complimentary and not billed.

      - name: sku
        description: >
          Product code for the billed item. Encodes both the product and the pricing
          type — SKUs ending with 'nfr' represent partner-priced (NFR) seats for that
          item. For NFR rows the sku is always 'IS-LTP-NFR'.
          Use sku for granular product + pricing tier reporting, item for
          product-only reporting.

      - name: partner_pricing
        description: >
          Boolean. True means the tenant has partner status — they are a reseller or
          MSP with a partner commercial relationship with IRONSCALES.
          False means the tenant is an end customer without partner status.
          Null for NFR rows.

      - name: price_type
        description: >
          The pricing rate type applied to this row. Values:
          'standard' — no special rate, billed at the standard price.
          'promo' — a promotional rate applied for a specific time period.
          'Exceptional' — a custom exceptional rate for a specific tenant or MSP.
          Null for NFR rows.

      - name: quantity
        description: >
          The number of billable units (seats/mailboxes) for this item on this
          billing_date, aggregated across all tenants under the LTP.
          For NFR rows this is the total NFR seat count before the 100-seat
          free tier is applied.

      - name: amount
        description: >
          The billing amount in local currency for this item on this billing_date,
          aggregated across all tenants under the LTP.
          For NFR rows this is the invoiced amount after applying the conversion
          rate and deducting the 100-seat free tier.

  - name: sltp_daily_itemized_new_billing_tbl
    config:
      grants:
        +select: ['CLAUDE_PILOT_ROLE']
    description: >
      Daily itemized billing amounts at the sub-tenant (leaf) level, using the updated
      billing calculation. The lower-granularity counterpart of
      ltp_daily_itemized_new_billing_tbl. One row per billing_date + tenant_path
      + item + sku + partner_pricing + price_type combination.

      Where ltp_daily_itemized_new_billing_tbl aggregates to the root partner
      (depth = 0), this table explodes the same billing down to the actual leaf
      tenant in the tenant hierarchy. Use this for per-customer revenue analysis;
      use ltp_daily_itemized_new_billing_tbl for per-partner totals. Daily totals
      across the two tables match — same revenue, different granularity.

      The tenant path is encoded across five columns — first_layer_id through
      fifth_layer_id — representing depth-ordered positions from root to leaf.
      first_layer_id is always populated and equals the ltp column in
      ltp_daily_itemized_new_billing_tbl. Layers beyond the actual depth are
      empty strings (''), not NULL. The last non-empty layer is the leaf
      tenant being billed; join that value to global_tenant_history.tenant_global_id
      for tenant details.

      Hierarchy patterns observed:
      1 layer  — LTP-only / self-billed (~337 LTPs)
      2 layers — Direct MSP → Customer (~302 LTPs, most common)
      3 layers — Disti → MSP → Customer (~35 LTPs, typical disti structure)
      4 layers — Disti → MSSP → MSP → Customer (~4 LTPs, rare)
      5 layers — Deeper configurations (~2 LTPs, very rare)

      Contains the same row types as ltp_daily_itemized_new_billing_tbl unioned
      together:
      1. Standard itemized billing rows per product and pricing type.
      2. NFR rows (item = 'NFR', sku = 'IS-LTP-NFR') representing the LTP's own
         partner seats billed at a special rate. Same NFR rules as the LTP
         table — MSP-type LTPs registered 90+ days ago, first 100 seats free.
      3. Min-commit top-up rows (sku = 'IS-LTP-MIN') when an LTP's daily total
         falls below their monthly_commitment_amount.

    columns:
      - name: billing_date
        description: >
          The date this billing record applies to. Always current_date as this
          table calculates the current day's billing only.

      - name: first_layer_id
        description: >
          The tenant_global_id of the root / first layer tenant in the hierarchy
          (depth = 0). Always populated. Same value as the ltp column in
          ltp_daily_itemized_new_billing_tbl. Join to
          global_tenant_history.tenant_global_id to get LTP details.

      - name: second_layer_id
        description: >
          The tenant_global_id of the second-layer tenant (depth = 1). Empty
          string ('') if the path doesn't go this deep (i.e., the LTP bills
          itself at the root only). When populated, this tenant is a direct
          child of first_layer_id.

      - name: third_layer_id
        description: >
          The tenant_global_id of the third-layer tenant (depth = 2). Empty
          string ('') if not populated. Common in distributor-led arrangements:
          Disti → MSP → Customer, where third_layer_id is the customer.

      - name: fourth_layer_id
        description: >
          The tenant_global_id of the fourth-layer tenant (depth = 3). Empty
          string ('') if not populated. Rare — typical pattern is
          Disti → MSSP → MSP → Customer.

      - name: fifth_layer_id
        description: >
          The tenant_global_id of the fifth-layer tenant (depth = 4). Empty
          string ('') if not populated. Very rare — deepest configuration
          observed.

      - name: item
        description: >
          The product line item being billed. Can be a base plan, an add-on, or NFR.

          Base plans: 'Email Protect', 'Complete Protect', 'Core', 'IRONSCALES Protect',
          'Phishing Simulation and Training', 'Starter', 'SAT Suite'.

          Add-ons: 'DMARC', 'Account Takeover', 'Incident Management', 'Multi Tenant',
          'S&T Bundle', 'S&T Plus Bundle', 'Security Awareness Training',
          'Habitu8', 'NINJIO', 'Cybermaniacs Videos'.

          Special: 'NFR' — the LTP's own partner seats billed at a special rate.
          Only applies to MSP-type LTPs registered 90+ days ago. The first 100
          NFR seats are complimentary and not billed.

      - name: sku
        description: >
          Product code for the billed item. Encodes both the product and the pricing
          type — SKUs ending with 'nfr' represent partner-priced (NFR) seats for that
          item. NFR rows always have sku = 'IS-LTP-NFR'. Min-commit top-up rows
          have sku = 'IS-LTP-MIN'. Use sku for granular product + pricing tier
          reporting, item for product-only reporting.

      - name: partner_pricing
        description: >
          Boolean. True means the tenant has partner status — they are a reseller or
          MSP with a partner commercial relationship with IRONSCALES.
          False means the tenant is an end customer without partner status.
          Null for NFR rows.

      - name: price_type
        description: >
          The pricing rate type applied to this row. Values:
          'standard' — no special rate, billed at the standard price.
          'promo' — a promotional rate applied for a specific time period.
          'Exceptional' — a custom exceptional rate for a specific tenant or MSP.
          Null for NFR rows.

      - name: quantity
        description: >
          The number of billable units (seats/mailboxes) for this item on this
          billing_date, for the specific tenant identified by the layer columns
          (i.e., not aggregated to the LTP root — that's the LTP table's role).
          For NFR rows this is the total NFR seat count before the 100-seat
          free tier is applied.

      - name: amount
        description: >
          The billing amount in local currency for this item on this billing_date,
          for the specific tenant identified by the layer columns. Sum across
          all rows in this table for a given LTP root equals the LTP-aggregated
          amount in ltp_daily_itemized_new_billing_tbl.
          For NFR rows this is the invoiced amount after applying the conversion
          rate and deducting the 100-seat free tier.